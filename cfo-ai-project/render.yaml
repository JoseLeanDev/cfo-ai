services:
  - type: web
    name: cfo-ai-fullstack
    runtime: node
    buildCommand: cd backend && npm install && npm run migrate && npm run seed && cd ../frontend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    disk:
      name: data
      mountPath: /opt/render/project/src/backend/database
      sizeGB: 1

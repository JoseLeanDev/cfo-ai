services:
  - type: web
    name: cfo-ai-backend
    runtime: node
    repo: https://github.com/josearias96/cfo-ai-backend
    buildCommand: npm install && npm run migrate && npm run seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: openrouter
      - key: APP_URL
        sync: false
      - key: DEFAULT_EMPRESA_ID
        value: 1
      - key: DEFAULT_USUARIO_ID
        value: 1
      - key: MONEDA_DEFAULT
        value: GTQ
      - key: TZ
        value: America/Guatemala
      - key: UMBRAL_LIQUIDEZ_CRITICO
        value: 100000
      - key: UMBRAL_LIQUIDEZ_ADVERTENCIA
        value: 500000
      - key: PROYECCION_UMBRAL_MINIMO
        value: 1000000
      - key: PROYECCION_UMBRAL_QUIEBRA
        value: 500000
      - key: CXP_MONTO_CRITICO
        value: 100000
